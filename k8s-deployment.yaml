apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-app-deployment
spec:
  replicas: 2  # コンテナを2個動かして負荷分散
  selector:
    matchLabels:
      app: bank-app
  template:
    metadata:
      labels:
        app: bank-app
    spec:
      containers:
      - name: bank-app
        image: rakuten-bank-app:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: bank-app-service
spec:
  type: NodePort
  selector:
    app: bank-app
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080